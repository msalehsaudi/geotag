# SentinelLabel Conda Environment
# ------------------------
# A standalone geospatial labeling environment for ML teams
#
# Quick start:
#   conda env create -f environment.yml
#   conda activate sentinellabel
#   pip install -e .
#
# To update:
#   conda env update -f environment.yml --prune
#
# To remove:
#   conda remove --name sentinellabel --all -y

name: sentinellabel
channels:
  - conda-forge
  - pytorch
dependencies:
  - python=3.10
  
  # Core web framework
  - fastapi>=0.110.0
  - uvicorn>=0.29.0
  
  # Geospatial stack
  - rioxarray>=0.15.0
  - rasterio>=1.3.0
  - geopandas>=0.14.0
  - pyproj>=3.4.0
  - shapely>=2.0.0
  - xarray>=2023.0.0
  - dask>=2024.1.0
  
  # STAC and cloud access
  - pystac-client>=0.7.0
  - planetary-computer>=1.0.0
  - aiohttp>=3.9.0
  
  # Machine learning & image processing
  - scikit-learn>=1.4.0
  - scikit-image>=0.22.0
  - scipy>=1.12.0
  - numpy>=1.26.0
  - pillow>=10.0.0
  
  # Utilities
  - pyyaml>=6.0.0
  - pandas>=2.0.0
  - joblib>=1.3.0
  
  # Development tools
  - pip
  - pip:
    - pydantic[email]>=2.5.0
    - black>=23.0.0
    - ruff>=0.1.0
    - mypy>=1.7.0
    - pytest>=7.4.0
    - pytest-mock>=3.12.0
